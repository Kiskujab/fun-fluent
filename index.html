    <style>
      /* Pre-hydration splash — disappears as soon as React mounts. */
      #root:empty::before {
        content: '⛰️';
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 64px;
        background: #fdf9f1;
        animation: splash-pulse 1.1s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
